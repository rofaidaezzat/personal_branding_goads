    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('set', 'autoConfig', false, '1680005749790106');
      fbq('init', '1680005749790106');
      fbq('track', 'PageView');
      fbq('track', 'ViewContent');

      // Track clicks on CTA buttons (e.g. "احجز اجتماع مجاني" or "Book a Free Meeting") as 'CTA' custom event
      document.addEventListener('click', function(e) {
        var target = e.target;
        while (target && target !== document.body) {
          if (target.textContent && (
            target.textContent.indexOf('احجز اجتماع مجاني') !== -1 || 
            target.textContent.indexOf('احجز الاجتماع المجاني') !== -1 ||
            target.textContent.indexOf('احجز اجتماعك المجاني') !== -1 ||
            target.textContent.toLowerCase().indexOf('book a free meeting') !== -1 ||
            target.textContent.toLowerCase().indexOf('book a meeting') !== -1 ||
            target.textContent.toLowerCase().indexOf('book free meeting') !== -1
          )) {
            fbq('trackCustom', 'CTA');
            fbq('trackCustom', 'احجز اجتماع مجاني');
            break;
          }
          target = target.parentElement;
        }
      });
    </script>
